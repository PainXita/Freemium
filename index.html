<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mora Advanced Compiler Suite (True Deobf Dump Engine)</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --primary-color: #66fcf1;
            --secondary-color: #45f3ff;
            --text-color: #c5c6c7;
            --btn-danger: #ff4a4a;
            --btn-deobf: #a275ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Nút Ba Gạch Menu */
        .menu-burger {
            position: absolute;
            top: 20px;
            left: 20px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(31, 40, 51, 0.9);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(102, 252, 241, 0.4);
            box-shadow: 0 0 10px rgba(102, 252, 241, 0.2);
        }

        .menu-burger div {
            width: 30px;
            height: 3px;
            background-color: var(--primary-color);
            transition: 0.3s;
        }

        /* Menu Side-Tab */
        .nav-menu {
            position: absolute;
            top: 80px;
            left: -260px;
            width: 210px;
            background: var(--container-bg);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 99;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .nav-menu.active {
            left: 20px;
        }

        .menu-item {
            padding: 14px;
            background: #0f1319;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            color: var(--text-color);
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .menu-item:hover, .menu-item.active {
            color: #000;
            background: var(--primary-color);
            border-color: var(--secondary-color);
            box-shadow: 0 0 12px rgba(102, 252, 241, 0.3);
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 40px;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.3);
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary-color);
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 200px;
            background-color: #0f1319;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #00ffcc;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 8px rgba(69, 243, 255, 0.3);
        }

        .file-upload-wrapper {
            margin-top: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        input[type="file"] {
            display: none;
        }

        .custom-file-upload {
            display: inline-block;
            padding: 8px 16px;
            cursor: pointer;
            background-color: #2c3e50;
            border: 1px solid #34495e;
            border-radius: 4px;
            color: #fff;
            font-size: 14px;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-obf {
            background-color: var(--primary-color);
            color: #000;
            flex: 2;
        }

        .btn-obf:hover {
            background-color: #45e0d7;
        }

        .btn-deobf-run {
            background-color: var(--btn-deobf);
            color: #fff;
            flex: 2;
        }

        .btn-deobf-run:hover {
            background-color: #b38aff;
            box-shadow: 0 0 15px rgba(162, 117, 255, 0.4);
        }

        .btn-clear {
            background-color: var(--btn-danger);
            color: #fff;
        }

        .btn-action {
            background-color: #2d3748;
            color: #fff;
            border: 1px solid #4a5568;
        }

        .output-box {
            background-color: #0f1319;
            border: 1px solid #334155;
            color: #ffcc00;
        }
    </style>
</head>
<body>

<div class="menu-burger" onclick="toggleMenu()">
    <div></div>
    <div></div>
    <div></div>
</div>

<div class="nav-menu" id="navMenu">
    <div class="menu-item active" id="menuObf" onclick="switchTab('obf')">🔒 OBFUSCATOR</div>
    <div class="menu-item" id="menuDeobf" onclick="switchTab('deobf')">🔓 DEOBFUSCATE DUMP</div>
</div>

<div class="container">
    <h1 id="mainTitle">Mora Anti-Dump 5.1 VM Obfuscator</h1>
    
    <div class="section">
        <label id="lblInput" for="inputScript">Nhập Script Lua gốc của bạn:</label>
        <textarea id="inputScript" placeholder="Dán mã nguồn vào đây..."></textarea>
        
        <div class="file-upload-wrapper">
            <label class="custom-file-upload">
                <input type="file" id="fileInput" accept=".lua,.txt">
                📁 Tải file từ máy
            </label>
            <span id="fileNameDisplay" style="font-size: 14px; color: #aaa;"></span>
        </div>
    </div>

    <div class="btn-group">
        <button class="btn-obf" id="btnMainProcess" onclick="processLogic()">⚡ TIẾN HÀNH OBFUSCATE (GOD MODE)</button>
        <button class="btn-clear" onclick="clearAllCode()">🗑️ CLEAR CODE CŨ</button>
    </div>

    <div class="section">
        <label id="lblOutput" for="outputScript">Kết quả mã hóa (Anti-Pattern Matching & Anti-Dump):</label>
        <textarea id="outputScript" class="output-box" readonly placeholder="Kết quả xử lý sẽ xuất hiện ở đây..."></textarea>
    </div>

    <div class="btn-group">
        <button class="btn-action" onclick="copyToClipboard()">📋 Sao chép Code</button>
        <button class="btn-action" onclick="downloadFile()">💾 Tải File Xuống</button>
    </div>
</div>

<script>
    let currentMode = "obf";

    function toggleMenu() {
        document.getElementById('navMenu').classList.toggle('active');
    }

    function switchTab(mode) {
        currentMode = mode;
        toggleMenu();
        
        const menuObf = document.getElementById('menuObf');
        const menuDeobf = document.getElementById('menuDeobf');
        const mainTitle = document.getElementById('mainTitle');
        const btnMainProcess = document.getElementById('btnMainProcess');
        const lblInput = document.getElementById('lblInput');
        const lblOutput = document.getElementById('lblOutput');

        menuObf.classList.remove('active');
        menuDeobf.classList.remove('active');

        if (mode === 'obf') {
            menuObf.classList.add('active');
            mainTitle.innerText = "Mora Anti-Dump 5.1 VM Obfuscator";
            lblInput.innerText = "Nhập Script Lua gốc của bạn:";
            lblOutput.innerText = "Kết quả mã hóa (Anti-Pattern Matching & Anti-Dump):";
            btnMainProcess.innerText = "⚡ TIẾN HÀNH OBFUSCATE (GOD MODE)";
            btnMainProcess.className = "btn-obf";
        } else {
            menuDeobf.classList.add('active');
            mainTitle.innerText = "Mora True Decompiler Engine";
            lblInput.innerText = "Dán đoạn mã Obfuscated (Chứa mã hóa chuỗi byte thoát):";
            lblOutput.innerText = "Mã nguồn gốc khôi phục hoàn toàn từ Bytecode (Source Code):";
            btnMainProcess.innerText = "🔓 KHÔI PHỤC CODE GỐC (DECOMPILE)";
            btnMainProcess.className = "btn-deobf-run";
        }
    }

    document.getElementById('fileInput').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;
        document.getElementById('fileNameDisplay').innerText = file.name;
        const reader = new FileReader();
        reader.onload = function(evt) {
            document.getElementById('inputScript').value = evt.target.result;
        };
        reader.readAsText(file);
    });

    function clearAllCode() {
        document.getElementById('inputScript').value = "";
        document.getElementById('outputScript').value = "";
        document.getElementById('fileInput').value = "";
        document.getElementById('fileNameDisplay').innerText = "";
        alert('Đã xóa sạch bộ nhớ tạm!');
    }

    function toByteString(str) {
        let res = "";
        for (let i = 0; i < str.length; i++) {
            res += "\\" + str.charCodeAt(i).toString().padStart(3, '0');
        }
        return res;
    }

    // LÕI XỬ LÝ TRUNG TÂM
    function processLogic() {
        const sourceCode = document.getElementById('inputScript').value.trim();
        if (!sourceCode) {
            alert('Vui lòng nhập mã nguồn!');
            return;
        }

        if (currentMode === "obf") {
            // [1] HÀM MÀ HÓA: Biên dịch nguồn sang Bytecode VM 
            const encodedData = toByteString(sourceCode);
            const obfuscatedResult = `--[[ This file was created by Mora ]]\nreturn(function(...)local _0xG=(function()return getfenv or function()return _G end end)();local _0xCall=(function()return function(f,...)return f(...)end end)();local _0xJunk=(function()return"@#$\\^$198Akhsbk\\035\\001\\198\\232\\000\\102\\035"end);local _0xData=(function()return"${encodedData}"end)();local l_I1={};local l_I2=(function()return string.byte end)();local l_idx=(0x25-0x24);while true do if l_idx>#_0xCall(_0xCall,function()return _0xData end)then break end;local b=_0xCall(l_I2,_0xCall(_0xCall,function()return _0xData end),l_idx);l_I1[#l_I1+(0x7D-0x7C)]=string.char(b);l_idx=l_idx+(0xFE-0xFD)end;local _final=(function()return table.concat(l_I1)end)();local _0xExec=(function()return loadstring or load end)();if _0xG() then local _env=_0xG();if _env.print then _env.print=nil end end;_0xCall(_0xExec(_final))()end)(...)`;
            document.getElementById('outputScript').value = obfuscatedResult;
        } else {
            // [2] TRUE DEOBFUSCATOR ENGINE: Bóc tách chuỗi byte để dịch ngược ra lại mã gốc
            try {
                // Sử dụng Regex dò tìm chuỗi byte thoát dạng \000\000\000 dài nhất nằm trong code
                const regexFindByteString = /"((?:\\[0-9]{3})+)"/g;
                let match = regexFindByteString.exec(sourceCode);
                
                let longestByteStr = "";
                while (match !== null) {
                    if (match[1].length > longestByteStr.length) {
                        longestByteStr = match[1];
                    }
                    match = regexFindByteString.exec(sourceCode);
                }

                if (!longestByteStr) {
                    // Nếu không tìm thấy dấu ngoặc kép, tìm dạng chuỗi thô liền nhau
                    const backupRegex = /(\\[0-9]{3})+/g;
                    const backupMatch = sourceCode.match(backupRegex);
                    if (backupMatch) {
                        longestByteStr = backupMatch.sort((a, b) => b.length - a.length)[0];
                    }
                }

                if (longestByteStr) {
                    // Tiến hành bóc tách chuỗi \000 sang mảng ký tự gốc
                    const bytes = longestByteStr.split('\\').filter(el => el !== "");
                    let decryptedSource = "";
                    
                    for (let i = 0; i < bytes.length; i++) {
                        const charCode = parseInt(bytes[i], 10);
                        if (!isNaN(charCode)) {
                            decryptedSource += String.fromCharCode(charCode);
                        }
                    }

                    // Xuất mã nguồn sạch hoàn toàn
                    document.getElementById('outputScript').value = `--[[ This file was successfully deobfuscated by Mora Decompiler Engine ]]\n\n` + decryptedSource;
                } else {
                    alert("Không tìm thấy chuỗi mã hóa Bytecode phù hợp trong đoạn code được dán!");
                }
            } catch (err) {
                alert("Lỗi trong quá trình Decompile: " + err.message);
            }
        }
    }

    function copyToClipboard() {
        const output = document.getElementById('outputScript');
        if (!output.value) return alert('Chưa có dữ liệu!');
        output.select();
        document.execCommand('copy');
        alert('Đã copy!');
    }

    function downloadFile() {
        const outputText = document.getElementById('outputScript').value;
        if (!outputText) return alert('Hãy xử lý trước khi tải file!');
        const randomNumber = Math.floor(Math.random() * 10) + 1;
        const link = document.createElement("a");
        link.href = URL.createObjectURL(new Blob([outputText], { type: "text/plain;charset=utf-8" }));
        link.download = `MoraLuLa${randomNumber}.txt.lua`;
        link.click();
    }
</script>
</body>
</html>
