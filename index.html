<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mora Obfuscator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0b0b0b;
            font-family: 'Segoe UI', system-ui, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            color: #d4d4d4;
        }
        .container {
            background: #1a1a1a;
            border: 1px solid #2a2a2a;
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 255, 100, 0.1);
            padding: 30px;
            width: 100%;
            max-width: 820px;
        }
        .header {
            text-align: center;
            margin-bottom: 25px;
        }
        .header h1 {
            font-size: 2.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, #0f0, #0c6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 3px;
            text-shadow: 0 0 30px #0f04;
        }
        .subtitle {
            color: #777;
            font-size: 0.9rem;
            margin-top: 5px;
        }
        .subtitle a {
            color: #0f0;
            text-decoration: none;
            font-weight: 600;
        }
        .drop-zone {
            border: 2px dashed #3a3a3a;
            border-radius: 14px;
            padding: 35px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.25s;
            background: #121212;
            margin-bottom: 18px;
        }
        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: #0f0;
            background: #1a2a1a;
            box-shadow: 0 0 24px rgba(0, 255, 0, 0.2);
        }
        .drop-zone .icon {
            font-size: 2.4rem;
            margin-bottom: 10px;
            color: #0f0;
        }
        .drop-zone p {
            color: #aaa;
            font-size: 0.95rem;
        }
        #fileInput {
            display: none;
        }
        .file-name-display {
            margin-top: 10px;
            color: #0f0;
            font-weight: 600;
            word-break: break-word;
        }
        .input-group {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 22px;
            flex-wrap: wrap;
        }
        .input-group label {
            font-weight: 600;
            color: #ccc;
            white-space: nowrap;
        }
        .input-group input {
            flex: 1;
            min-width: 180px;
            padding: 11px 14px;
            background: #111;
            border: 1px solid #333;
            border-radius: 10px;
            color: #eee;
            font-family: 'Courier New', monospace;
            transition: 0.2s;
        }
        .input-group input:focus {
            outline: none;
            border-color: #0f0;
            box-shadow: 0 0 12px rgba(0, 255, 0, 0.3);
        }
        .btn {
            padding: 12px 22px;
            border: none;
            border-radius: 10px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.95rem;
            letter-spacing: 0.4px;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            text-transform: uppercase;
        }
        .btn-primary {
            background: linear-gradient(145deg, #00c853, #009624);
            color: #fff;
            box-shadow: 0 6px 18px rgba(0, 200, 0, 0.4);
            width: 100%;
            font-size: 1.15rem;
            padding: 14px;
        }
        .btn-primary:hover {
            background: linear-gradient(145deg, #00e676, #00c853);
            box-shadow: 0 8px 22px rgba(0, 255, 0, 0.5);
            transform: translateY(-1px);
        }
        .btn-primary:active {
            transform: translateY(1px);
        }
        .btn-secondary {
            background: #1f1f1f;
            color: #0f0;
            border: 1px solid #0f0;
        }
        .btn-secondary:hover {
            background: #0f0;
            color: #000;
        }
        .output-section {
            margin-top: 25px;
            display: none;
        }
        .output-section.active {
            display: block;
        }
        textarea {
            width: 100%;
            height: 280px;
            background: #0a0a0a;
            border: 1px solid #333;
            border-radius: 12px;
            color: #b0ffb0;
            font-family: 'Courier New', monospace;
            font-size: 0.85rem;
            padding: 16px;
            resize: vertical;
            margin-bottom: 16px;
            line-height: 1.5;
        }
        textarea:focus {
            outline: none;
            border-color: #0f0;
        }
        .action-buttons {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .action-buttons .btn {
            flex: 1;
        }
        .loading-spinner {
            display: none;
            width: 32px;
            height: 32px;
            border: 3px solid #2a2a2a;
            border-top-color: #0f0;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin: 12px auto;
        }
        @keyframes spin {
            to {
                transform: rotate(360deg);
            }
        }
        .status-message {
            text-align: center;
            color: #aaa;
            margin-top: 12px;
            font-size: 0.9rem;
            min-height: 22px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>MORA OBFUSCATOR</h1>
            <div class="subtitle">
                Lua 5.1 Advanced Obfuscation • <a href="https://discord.gg/gqsn7nUcft" target="_blank">Discord</a>
            </div>
        </div>

        <div class="drop-zone" id="dropZone">
            <div class="icon">📁</div>
            <p>Kéo thả file .lua vào đây hoặc click để chọn</p>
            <div class="file-name-display" id="fileNameDisplay"></div>
            <input type="file" id="fileInput" accept=".lua,.txt">
        </div>

        <div class="input-group">
            <label>📄 Tên file xuất:</label>
            <input type="text" id="outputName" value="Mora.lua" placeholder="Mora.lua">
        </div>

        <button class="btn btn-primary" id="obfBtn">
            ⚡ Obf Script
        </button>
        <div class="loading-spinner" id="loadingSpinner"></div>

        <div class="output-section" id="outputSection">
            <textarea id="outputCode" readonly placeholder="Script đã mã hóa sẽ hiển thị ở đây..."></textarea>
            <div class="action-buttons">
                <button class="btn btn-secondary" id="copyBtn">📋 Copy</button>
                <button class="btn btn-secondary" id="downloadBtn">💾 Tải về</button>
            </div>
            <div class="status-message" id="statusMsg"></div>
        </div>
    </div>

    <script>
        (function() {
            const dropZone = document.getElementById('dropZone');
            const fileInput = document.getElementById('fileInput');
            const fileNameDisplay = document.getElementById('fileNameDisplay');
            const outputName = document.getElementById('outputName');
            const obfBtn = document.getElementById('obfBtn');
            const loadingSpinner = document.getElementById('loadingSpinner');
            const outputSection = document.getElementById('outputSection');
            const outputCode = document.getElementById('outputCode');
            const copyBtn = document.getElementById('copyBtn');
            const downloadBtn = document.getElementById('downloadBtn');
            const statusMsg = document.getElementById('statusMsg');

            let selectedFile = null;

            dropZone.addEventListener('click', () => fileInput.click());

            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) handleFile(e.target.files[0]);
            });

            dropZone.addEventListener('dragover', (e) => {
                e.preventDefault();
                dropZone.classList.add('dragover');
            });

            dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));

            dropZone.addEventListener('drop', (e) => {
                e.preventDefault();
                dropZone.classList.remove('dragover');
                if (e.dataTransfer.files.length > 0) handleFile(e.dataTransfer.files[0]);
            });

            function handleFile(file) {
                if (!file.name.endsWith('.lua') && !file.name.endsWith('.txt')) {
                    alert('Vui lòng chọn file .lua hoặc .txt');
                    return;
                }
                selectedFile = file;
                fileNameDisplay.textContent = '✅ ' + file.name + ' (' + formatBytes(file.size) + ')';
                if (outputName.value === 'Mora.lua' || outputName.value === '') {
                    const baseName = file.name.replace(/\.[^/.]+$/, "");
                    outputName.value = baseName + '_obf.lua';
                }
            }

            function formatBytes(bytes) {
                if (bytes < 1024) return bytes + ' B';
                if (bytes < 1048576) return (bytes / 1024).toFixed(1) + ' KB';
                return (bytes / 1048576).toFixed(1) + ' MB';
            }

            obfBtn.addEventListener('click', async () => {
                if (!selectedFile) {
                    alert('Vui lòng chọn file Lua trước!');
                    return;
                }
                const outName = outputName.value.trim();
                if (!outName) {
                    alert('Vui lòng nhập tên file xuất!');
                    return;
                }
                loadingSpinner.style.display = 'block';
                obfBtn.disabled = true;
                outputSection.classList.remove('active');
                statusMsg.textContent = '';
                try {
                    const obfuscated = await generateObfuscatedLua(selectedFile, outName);
                    outputCode.value = obfuscated;
                    outputSection.classList.add('active');
                    statusMsg.textContent = '✅ Obfuscation hoàn tất! Kích thước: ' + formatBytes(new TextEncoder()
                        .encode(obfuscated).length);
                } catch (err) {
                    alert('Lỗi: ' + err.message);
                } finally {
                    loadingSpinner.style.display = 'none';
                    obfBtn.disabled = false;
                }
            });

            async function generateObfuscatedLua(file, outName) {
                const sourceText = await file.text();
                const sourceBytes = new TextEncoder().encode(sourceText);
                if (sourceBytes.length === 0) throw new Error('File rỗng!');

                // Tạo key ngẫu nhiên 32 byte
                const keyLength = 32;
                const key = new Uint8Array(keyLength);
                crypto.getRandomValues(key);

                // Mã hóa dữ liệu bằng XOR
                const encrypted = new Uint8Array(sourceBytes.length);
                for (let i = 0; i < sourceBytes.length; i++) {
                    encrypted[i] = sourceBytes[i] ^ key[i % keyLength];
                }

                // Key đã mã hóa (XOR 0xAA)
                const keyEnc = Array.from(key).map(b => b ^ 0xAA);
                // Dữ liệu đã mã hóa
                const dataEnc = Array.from(encrypted);

                // --- Tạo các phần code rác để đạt kích thước mục tiêu ---
                const targetMin = 100 * 1024; // 100KB
                const targetMax = 130 * 1024; // 130KB

                // Header
                let header =
                    `--[[ This file was by Mora [https://discord.gg/gqsn7nUcft] ]]\n\n`;
                let payloadCore =
                    `local _K={${keyEnc.join(',')}} local _D={${dataEnc.join(',')}} `;
                payloadCore +=
                    `local function _bxor(a,b)local r=0;for i=0,7 do if(a%2~=b%2)then r=r+2^i end;a=math.floor(a/2);b=math.floor(b/2)end;return r;end;`;
                payloadCore +=
                    `local bit32={bxor=_bxor};local function _dec(d,k)local o={}for i=1,#d do o[i]=string.char(bit32.bxor(d[i],k[(i-1)%#k+1]))end;return table.concat(o)end;`;
                payloadCore +=
                    `local _src=_dec(_D,_K);local _f,_e=loadstring(_src)if _f then _f()else error(_e)end;`;

                // Đoạn code rác phụ (fake functions như AP, oG, XP, ...) để đạt kích thước và gây rối
                let junk = generateJunkCode(35 * 1024); // khoảng 35KB rác cơ bản

                let combined = header + junk + payloadCore;
                let currentSize = new TextEncoder().encode(combined).length;

                // Nếu chưa đủ 100KB, thêm comment rác
                if (currentSize < targetMin) {
                    const needed = targetMin - currentSize + 4 * 1024; // dư 4KB
                    combined += '\n' + generateRandomComment(needed);
                    currentSize = new TextEncoder().encode(combined).length;
                }

                // Nếu vượt quá 130KB, cắt bớt comment (an toàn)
                if (currentSize > targetMax) {
                    const excess = currentSize - targetMax;
                    // Tìm vị trí comment cuối cùng được thêm vào
                    const lastCommentStart = combined.lastIndexOf('\n--[[');
                    if (lastCommentStart !== -1) {
                        const partBefore = combined.substring(0, lastCommentStart);
                        const newNeeded = Math.max(0, (targetMax - new TextEncoder().encode(
                            partBefore + '\n').length));
                        combined = partBefore + '\n' + generateRandomComment(newNeeded);
                    } else {
                        // Cắt thô: cắt bớt kí tự cuối
                        combined = combined.substring(0, targetMax - 10) + '\n--]]';
                    }
                }

                // Đảm bảo kết thúc không lỗi cú pháp (comment được đóng)
                if (combined.includes('--[[') && !combined.includes(']]')) {
                    combined += ']]';
                }
                // Loại bỏ các ký tự không mong muốn
                combined = combined.replace(/\]\]/g, ']]'); // không cần
                return combined;
            }

            function generateJunkCode(targetBytes) {
                // Tạo ra các hàm, biến rác dùng bit32.bxor và các phép toán phức tạp
                let junk = '';
                const funcNames = ['AP', 'oG', 'XP', 'hP', 'ZR', 'TK', 'LM', 'NQ'];
                const varNames = [];
                for (let i = 0; i < 30; i++) {
                    varNames.push('v' + Math.random().toString(36).substring(2, 8));
                }
                junk += 'local ' + varNames.join(',') + ';\n';
                for (let i = 0; i < funcNames.length; i++) {
                    junk += `local ${funcNames[i]}=function(...)local a,b,c=...;`;
                    // Thêm vòng lặp vô dụng
                    junk +=
                        `for _=1,${10+Math.floor(Math.random()*20)} do a=bit32.bxor(a or 0,b or 1);end;`;
                    junk += `return a,b,c;end;\n`;
                }
                // Gọi các hàm đó vài lần để tránh bị loại bỏ
                junk +=
                    `local _=AP(1,2,3)local __=oG(4,5,6)local ___=XP(7,8,9)local ____=hP(0,0,0);\n`;
                // Thêm các biểu thức dài
                junk +=
                    `local _J=${Array(50).fill(0).map(()=>Math.floor(Math.random()*256)).join(',')};`;
                junk += `for i=1,#_J do _J[i]=bit32.bxor(_J[i],i%32);end;\n`;
                // Đo đạc kích thước hiện tại
                let current = new TextEncoder().encode(junk).length;
                if (current < targetBytes) {
                    const needed = targetBytes - current;
                    junk += generateRandomComment(needed);
                }
                return junk;
            }

            function generateRandomComment(targetBytes) {
                const chars =
                    'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*()_+-={}|;:,.<>?/ ';
                let result = '';
                const encoder = new TextEncoder();
                let currentBytes = 0;
                while (currentBytes < targetBytes) {
                    const char = chars[Math.floor(Math.random() * chars.length)];
                    const charBytes = encoder.encode(char).length;
                    if (currentBytes + charBytes <= targetBytes) {
                        result += char;
                        currentBytes += charBytes;
                    } else {
                        if (currentBytes < targetBytes) {
                            result += ' ';
                            currentBytes++;
                        } else break;
                    }
                }
                // Đảm bảo không có dấu ]] phá comment
                result = result.replace(/\]/g, ' ');
                return '--[[' + result + ']]';
            }

            copyBtn.addEventListener('click', async () => {
                try {
                    await navigator.clipboard.writeText(outputCode.value);
                    statusMsg.textContent = '📋 Đã sao chép vào clipboard!';
                    setTimeout(() => { if (statusMsg.textContent ===
                            '📋 Đã sao chép vào clipboard!') statusMsg.textContent = ''; }, 2500);
                } catch (err) {
                    outputCode.select();
                    document.execCommand('copy');
                    statusMsg.textContent = '📋 Đã sao chép (fallback)!';
                }
            });

            downloadBtn.addEventListener('click', () => {
                const content = outputCode.value;
                const fileName = outputName.value.trim() || 'Mora_obf.lua';
                const blob = new Blob([content], { type: 'text/plain;charset=utf-8' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = fileName;
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                URL.revokeObjectURL(url);
                statusMsg.textContent = '💾 Đã tải xuống ' + fileName;
            });
        })();
    </script>
</body>
</html>
