<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mora Premium Obfuscator Suite (Prometheus Style)</title>
    <style>
        :root {
            --bg-color: #0b0c10;
            --container-bg: #1f2833;
            --primary-color: #66fcf1;
            --secondary-color: #45f3ff;
            --text-color: #c5c6c7;
            --btn-danger: #ff4a4a;
            --btn-deobf: #a275ff;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Nút Ba Gạch Menu */
        .menu-burger {
            position: absolute;
            top: 20px;
            left: 20px;
            cursor: pointer;
            z-index: 100;
            display: flex;
            flex-direction: column;
            gap: 6px;
            background: rgba(31, 40, 51, 0.9);
            padding: 12px;
            border-radius: 8px;
            border: 1px solid rgba(102, 252, 241, 0.4);
            box-shadow: 0 0 10px rgba(102, 252, 241, 0.2);
        }

        .menu-burger div {
            width: 30px;
            height: 3px;
            background-color: var(--primary-color);
            transition: 0.3s;
        }

        /* Menu Side-Tab */
        .nav-menu {
            position: absolute;
            top: 80px;
            left: -260px;
            width: 210px;
            background: var(--container-bg);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 8px;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.6);
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 99;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .nav-menu.active {
            left: 20px;
        }

        .menu-item {
            padding: 14px;
            background: #0f1319;
            border-radius: 6px;
            cursor: pointer;
            text-align: center;
            font-weight: bold;
            color: var(--text-color);
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .menu-item:hover, .menu-item.active {
            color: #000;
            background: var(--primary-color);
            border-color: var(--secondary-color);
            box-shadow: 0 0 12px rgba(102, 252, 241, 0.3);
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-top: 40px;
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
            font-size: 26px;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.3);
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary-color);
            font-weight: bold;
        }

        textarea {
            width: 100%;
            height: 200px;
            background-color: #0f1319;
            border: 1px solid #334155;
            border-radius: 6px;
            color: #00ffcc;
            padding: 12px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 14px;
            resize: vertical;
            box-sizing: border-box;
        }

        textarea:focus {
            outline: none;
            border-color: var(--secondary-color);
            box-shadow: 0 0 8px rgba(69, 243, 255, 0.3);
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-obf {
            background-color: var(--primary-color);
            color: #000;
            flex: 2;
        }

        .btn-obf:hover {
            background-color: #45e0d7;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.4);
        }

        .btn-deobf-run {
            background-color: var(--btn-deobf);
            color: #fff;
            flex: 2;
        }

        .btn-deobf-run:hover {
            background-color: #b38aff;
            box-shadow: 0 0 15px rgba(162, 117, 255, 0.4);
        }

        .btn-clear {
            background-color: var(--btn-danger);
            color: #fff;
        }

        .btn-action {
            background-color: #2d3748;
            color: #fff;
            border: 1px solid #4a5568;
        }

        .output-box {
            background-color: #0f1319;
            border: 1px solid #334155;
            color: #ffcc00;
        }
    </style>
</head>
<body>

<div class="menu-burger" onclick="toggleMenu()">
    <div></div>
    <div></div>
    <div></div>
</div>

<div class="nav-menu" id="navMenu">
    <div class="menu-item active" id="menuObf" onclick="switchTab('obf')">🔒 OBFUSCATOR</div>
    <div class="menu-item" id="menuDeobf" onclick="switchTab('deobf')">🔓 DEOBFUSCATE DUMP</div>
</div>

<div class="container">
    <h1 id="mainTitle">Mora Advanced Obfuscator Suite</h1>
    
    <div class="section">
        <label id="lblInput" for="inputScript">Nhập Script Lua gốc của bạn:</label>
        <textarea id="inputScript" placeholder="Dán mã nguồn cần xử lý vào đây..."></textarea>
    </div>

    <div class="btn-group">
        <button class="btn-obf" id="btnMainProcess" onclick="processLogic()">⚡ TIẾN HÀNH OBFUSCATE (PROMETHEUS V2)</button>
        <button class="btn-clear" onclick="clearAllCode()">🗑️ CLEAR CODE CŨ</button>
    </div>

    <div class="section">
        <label id="lblOutput" for="outputScript">Kết quả đầu ra:</label>
        <textarea id="outputScript" class="output-box" readonly placeholder="Kết quả xử lý thuật toán sẽ hiển thị ở đây..."></textarea>
    </div>

    <div class="btn-group">
        <button class="btn-action" onclick="copyToClipboard()">📋 Sao chép Code</button>
    </div>
</div>

<script>
    let currentMode = "obf";

    function toggleMenu() {
        document.getElementById('navMenu').classList.toggle('active');
    }

    function switchTab(mode) {
        currentMode = mode;
        toggleMenu();
        
        const menuObf = document.getElementById('menuObf');
        const menuDeobf = document.getElementById('menuDeobf');
        const mainTitle = document.getElementById('mainTitle');
        const btnMainProcess = document.getElementById('btnMainProcess');
        const lblInput = document.getElementById('lblInput');
        const lblOutput = document.getElementById('lblOutput');

        menuObf.classList.remove('active');
        menuDeobf.classList.remove('active');

        if (mode === 'obf') {
            menuObf.classList.add('active');
            mainTitle.innerText = "Mora Advanced Obfuscator Suite";
            lblInput.innerText = "Nhập Script Lua gốc của bạn:";
            lblOutput.innerText = "Kết quả mã hóa chống dumper nâng cao:";
            btnMainProcess.innerText = "⚡ TIẾN HÀNH OBFUSCATE (PROMETHEUS V2)";
            btnMainProcess.className = "btn-obf";
        } else {
            menuDeobf.classList.add('active');
            mainTitle.innerText = "Mora Anti-Dump Solver";
            lblInput.innerText = "Dán đoạn mã Obfuscated Dump cần giải mã:";
            lblOutput.innerText = "Mã nguồn sạch thu được từ mảng bộ nhớ:";
            btnMainProcess.innerText = "🔓 PHÂN TÍCH & GIẢI MÃ CHUỖI DUMP";
            btnMainProcess.className = "btn-deobf-run";
        }
    }

    function clearAllCode() {
        document.getElementById('inputScript').value = "";
        document.getElementById('outputScript').value = "";
        alert('Đã xóa sạch bộ nhớ tạm!');
    }

    // Biến đổi chuỗi ký tự thành mảng định dạng byte hệ 10 phân tách bằng dấu phẩy
    function toByteList(str) {
        let list = [];
        for (let i = 0; i < str.length; i++) {
            list.push(str.charCodeAt(i));
        }
        return list.join(",");
    }

    // Bộ xử lý trung tâm gộp đầy đủ tính năng
    function processLogic() {
        const sourceCode = document.getElementById('inputScript').value.trim();
        if (!sourceCode) {
            alert('Vui lòng nhập mã nguồn trước!');
            return;
        }

        if (currentMode === "obf") {
            // [1] PHÂN HỆ MÃ HÓA NÂNG CAO (MÔ PHỎNG DUMP CHUẨN)
            const byteListStr = toByteList(sourceCode);
            const randomKey = Math.floor(Math.random() * 150) + 50; // Tạo khóa ngẫu nhiên luân chuyển vị trí mảng
            
            const obfuscatedCode = `--[[
    Generated Using Mora Premium Suite
    Anti-Dump & Control Flow Obfuscation Enabled
]]
local v4 = function()
    local abs, values;
    if not debug then
        return false;
    else
        abs = math.abs;
        values = { pcall(debug.info, math.abs, "sn") };
        if not values[1] or tostring(values[2]) ~= "[C]" or values[3] ~= "abs" then
            return "detected";
        else
            return true;
        end;
    end;
end;

local _pool = { ${byteListStr} };
local v5 = function(poolData, keyShift)
    local result = "";
    local stringByte = string.char;
    for i = 1, #poolData do
        local decodedByte = (poolData[i] - keyShift) % 256;
        result = result .. stringByte(decodedByte);
    end;
    return result;
end;

if v4() == true then
    local _exec = loadstring or load;
    _exec(v5(_pool, ${randomKey}))();
else
    print("Environment Verification Failed!");
end;`;

            document.getElementById('outputScript').value = obfuscatedCode;
        } else {
            // [2] PHÂN HỆ GIẢI MÃ NGƯỢC (DEOBFUSCATOR)
            try {
                // Sử dụng regex dò tìm mảng số nguyên của Pool Data dạng { xx, xx, xx }
                const poolRegex = /_pool\s*=\s*\{\s*([0-9\s,]+)\s*\}/;
                const poolMatch = sourceCode.match(poolRegex);
                
                // Dò tìm tham số keyShift được truyền vào ở cuối hàm v5
                const keyRegex = /v5\(\s*_pool\s*,\s*([0-9]+)\s*\)/;
                const keyMatch = sourceCode.match(keyRegex);

                if (poolMatch && keyMatch) {
                    const rawBytes = poolMatch[1].split(',').map(x => parseInt(x.trim(), 10));
                    const keyShift = parseInt(keyMatch[1], 10);
                    
                    let decryptedString = "";
                    for (let i = 0; i < rawBytes.length; i++) {
                        // Tính toán ngược lại toán tử đồng dư số học để kéo chuỗi ký tự gốc ra
                        let originalByte = (rawBytes[i] - keyShift) % 256;
                        if (originalByte < 0) originalByte += 256;
                        decryptedString += String.fromCharCode(originalByte);
                    }

                    document.getElementById('outputScript').value = `--[[ Code gốc giải mã từ Pool thành công bởi Mora Engine ]]\n\n` + decryptedString;
                } else {
                    alert("Không nhận diện được cấu trúc mảng _pool hoặc tham số Key giải mã theo chuẩn của hệ thống!");
                }
            } catch (err) {
                alert("Lỗi phân tích cú pháp Dump: " + err.message);
            }
        }
    }

    function copyToClipboard() {
        const output = document.getElementById('outputScript');
        if (!output.value) return alert('Chưa có mã nguồn để sao chép!');
        output.select();
        document.execCommand('copy');
        alert('Đã copy vào bộ nhớ tạm thành công!');
    }
</script>
</body>
</html>
