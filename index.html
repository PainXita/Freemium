<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mora Obf by _@hmso53Dz</title>
    <style>
        :root {
            --container-bg: rgba(31, 40, 51, 0.85);
            --primary-color: #66fcf1;
            --secondary-color: #45f3ff;
            --text-color: #c5c6c7;
            --btn-danger: #ff4a4a;
            --btn-edit: #ffaa00;
            --btn-raw: #00ff66;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('https://raw.githubusercontent.com/PainXita/Gif/refs/heads/main/meme-troll-3.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
        }

        /* Biển báo cấm ở trên cùng giao diện chính */
        .warning-sign {
            display: block;
            text-align: center;
            font-size: 50px;
            color: var(--btn-danger);
            margin-bottom: -10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
            font-size: 26px;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.3);
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary-color);
            font-weight: bold;
        }

        .input-text {
            width: 100%;
            background-color: rgba(15, 19, 25, 0.9);
            border: 1px solid #334155;
            border-radius: 6px;
            color: #00ffcc;
            padding: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            box-sizing: border-box;
        }

        input.input-text {
            font-size: 15px;
            margin-bottom: 15px;
        }

        textarea.input-text {
            height: 220px;
            font-size: 14px;
            resize: vertical;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-obf-raw {
            background-color: var(--primary-color);
            color: #000;
            flex: 2;
        }

        .btn-obf-raw:hover {
            background-color: #45e0d7;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.4);
        }

        /* Khung hiển thị link và các nút chức năng sau khi nhấn Obf Raw */
        .result-panel {
            display: none;
            background: rgba(15, 19, 25, 0.95);
            border: 2px dashed var(--secondary-color);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }

        .link-display {
            font-family: 'Consolas', monospace;
            background: #000;
            padding: 12px;
            border-radius: 4px;
            color: var(--secondary-color);
            word-break: break-all;
            font-size: 15px;
            border: 1px solid #222;
            margin-bottom: 15px;
            text-align: center;
        }

        .action-group {
            display: flex;
            gap: 10px;
        }

        .btn-raw-view { background-color: var(--btn-raw); color: #000; }
        .btn-edit-script { background-color: var(--btn-edit); color: #000; }
        .btn-delete-script { background-color: var(--btn-danger); color: #fff; }

        /* Giao diện xem RAW phủ full màn hình bằng ảnh meme-troll-13 */
        .raw-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://raw.githubusercontent.com/PainXita/Gif/refs/heads/main/meme-troll-13.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 10000;
            overflow-y: auto;
            padding: 40px;
            box-sizing: border-box;
        }

        .raw-code-container {
            max-width: 850px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.94);
            border: 1px solid var(--secondary-color);
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 0 35px rgba(69, 243, 255, 0.4);
            position: relative;
        }

        .close-raw {
            position: absolute;
            top: 15px;
            right: 15px;
            background: var(--btn-danger);
            color: white;
            border: none;
            padding: 6px 14px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
            font-size: 13px;
        }

        .raw-warning-sign {
            font-size: 45px;
            text-align: center;
            margin-bottom: 10px;
        }

        .font-beautiful {
            font-family: 'Consolas', 'Courier New', monospace;
            color: #00ffaa;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.6;
            font-size: 15px;
            margin: 0;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="warning-sign">🚫</div>
    <h1>Mora Obf by _@hmso53Dz</h1>
    
    <div class="section">
        <label for="scriptName">Tên Script:</label>
        <input type="text" id="scriptName" class="input-text" placeholder="Ví dụ: Mora.lua">
        
        <label for="inputScript">Nhập Source Code Lua:</label>
        <textarea id="inputScript" class="input-text" placeholder="Dán mã nguồn Lua của bạn vào đây..."></textarea>
    </div>

    <div class="btn-group">
        <button class="btn-obf-raw" onclick="generateObfRaw()">Obf Raw</button>
    </div>

    <div class="result-panel" id="resultPanel">
        <label>Đường dẫn Raw (Pastefy Kiểu Mẫu):</label>
        <div class="link-display" id="generatedLink">https://pastefy.app/RGCFXPKT/raw</div>
        
        <div class="action-group">
            <button class="btn-raw-view" onclick="openRawOverlay()">Nút 1: Raw</button>
            <button class="btn-edit-script" onclick="editScriptData()">Nút 2: Chỉnh sửa Script</button>
            <button class="btn-delete-script" onclick="deleteScriptData()">Nút 3: Xóa</button>
        </div>
    </div>
</div>

<div class="raw-overlay" id="rawOverlay">
    <div class="raw-code-container">
        <button class="close-raw" onclick="closeRawOverlay()">Đóng [X]</button>
        <div class="raw-warning-sign">🚫</div>
        <pre class="font-beautiful" id="rawCodePre"></pre>
    </div>
</div>

<script>
    // Bộ nhớ cục bộ lưu trữ dữ liệu text thô của hệ thống
    let pastefyStorage = {
        hasData: false,
        randomKey: "",
        fileName: "",
        rawContent: ""
    };

    // Hàm sinh chuỗi khóa ngẫu nhiên (Ví dụ: RGCFXPKT)
    function generateRandomKey(length = 8) {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        let result = '';
        for (let i = 0; i < length; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    function generateObfRaw() {
        const name = document.getElementById('scriptName').value.trim();
        const code = document.getElementById('inputScript').value.trim();

        if (!name || !code) {
            alert('Vui lòng cung cấp đầy đủ tên script và mã nguồn!');
            return;
        }

        // Lưu giữ dữ liệu thô nguyên bản không qua mã hóa
        pastefyStorage.hasData = true;
        pastefyStorage.randomKey = generateRandomKey(8);
        pastefyStorage.fileName = name;
        pastefyStorage.rawContent = code;

        // Sinh link ảo theo định dạng Pastefy: https://(tên-web)/(RGCFXPKT)/raw
        const currentDomain = window.location.hostname || "pastefy.app";
        const finalFakeUrl = `https://${currentDomain}/${pastefyStorage.randomKey}/raw`;
        
        document.getElementById('generatedLink').innerText = finalFakeUrl;
        document.getElementById('resultPanel').style.display = 'block';
        
        alert('Đã khởi tạo link Raw thành công!');
    }

    // Nút 1: Mở giao diện hiển thị mã nguồn Raw thuần túy
    function openRawOverlay() {
        if (!pastefyStorage.hasData) return;

        // Khởi tạo chữ ký bản quyền bằng phông chữ đẹp của hệ thống
        let completeOutput = `--[[ This file was by Mora \n]]\n\n`;
        
        // Nối thẳng với mã nguồn thô của bạn (Không sử dụng hàm return hay mã hóa biến đổi)
        completeOutput += pastefyStorage.rawContent;

        // Đẩy nội dung lên màn hình giao diện xem Raw độc lập
        document.getElementById('rawCodePre').innerText = completeOutput;
        document.getElementById('rawOverlay').style.display = 'block';
    }

    function closeRawOverlay() {
        document.getElementById('rawOverlay').style.display = 'none';
    }

    // Nút 2: Chỉnh sửa lại nội dung Script
    function editScriptData() {
        if (!pastefyStorage.hasData) return;
        alert('Bạn có thể chỉnh sửa lại nội dung ở các ô nhập phía trên, sau đó nhấn lại nút "Obf Raw".');
        document.getElementById('inputScript').focus();
    }

    // Nút 3: Xóa hoàn toàn Script ra khỏi hệ thống bộ nhớ tạm
    function deleteScriptData() {
        if (!confirm('Bạn có chắc chắn muốn xóa văn bản Raw này không?')) return;
        
        pastefyStorage.hasData = false;
        pastefyStorage.randomKey = "";
        pastefyStorage.fileName = "";
        pastefyStorage.rawContent = "";

        document.getElementById('scriptName').value = "";
        document.getElementById('inputScript').value = "";
        document.getElementById('resultPanel').style.display = 'none';
        
        alert('Đã xóa dữ liệu thành công!');
    }

    // Cơ chế chống dump từ xa bằng bot hoặc tool: Trả về dòng văn bản troll nếu bị cào lén ngoài giao diện chính
    document.addEventListener('copy', function(e) {
        if (document.getElementById('rawOverlay').style.display === 'block') {
            // Nếu người dùng đang mở xem giao diện raw, cho phép copy code bình thường
        } else {
            // Nếu bot sao chép lén hoặc scrape tự động ngoài bảng điều khiển, trả về chuỗi troll thách thức
            e.clipboardData.setData('text/plain', `--[[ This file was by Mora \n\nTHÁCH MÀY DUMP ĐƯỢC🗿 \n]]`);
            e.preventDefault();
        }
    });
</script>
</body>
</html>
