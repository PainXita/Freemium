<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mora Obf by _@hmso53Dz</title>
    <style>
        :root {
            --container-bg: rgba(31, 40, 51, 0.85);
            --primary-color: #66fcf1;
            --secondary-color: #45f3ff;
            --text-color: #c5c6c7;
            --btn-danger: #ff4a4a;
            --btn-edit: #ffaa00;
            --btn-raw: #00ff66;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-image: url('https://raw.githubusercontent.com/PainXita/Gif/refs/heads/main/meme-troll-3.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 100%;
            max-width: 950px;
            background: var(--container-bg);
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(4px);
        }

        /* Biển báo cấm ở trên cùng tiêu đề */
        .warning-sign {
            display: block;
            text-align: center;
            font-size: 50px;
            color: var(--btn-danger);
            margin-bottom: -10px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        h1 {
            text-align: center;
            color: var(--primary-color);
            margin-bottom: 25px;
            font-size: 26px;
            font-family: 'Courier New', Courier, monospace;
            letter-spacing: 1px;
            text-shadow: 0 0 10px rgba(102, 252, 241, 0.3);
        }

        .section {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: var(--primary-color);
            font-weight: bold;
        }

        .input-text {
            width: 100%;
            background-color: rgba(15, 19, 25, 0.9);
            border: 1px solid #334155;
            border-radius: 6px;
            color: #00ffcc;
            padding: 12px;
            font-family: 'Consolas', 'Courier New', monospace;
            box-sizing: border-box;
        }

        input.input-text {
            font-size: 15px;
            margin-bottom: 15px;
        }

        textarea.input-text {
            height: 220px;
            font-size: 14px;
            resize: vertical;
        }

        .btn-group {
            display: flex;
            gap: 10px;
            margin: 20px 0;
        }

        button {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-obf-raw {
            background-color: var(--primary-color);
            color: #000;
            flex: 2;
        }

        .btn-obf-raw:hover {
            background-color: #45e0d7;
            box-shadow: 0 0 15px rgba(102, 252, 241, 0.4);
        }

        /* Khung chứa kết quả link và các nút chức năng sinh ra sau khi Raw */
        .result-panel {
            display: none;
            background: rgba(15, 19, 25, 0.95);
            border: 2px dashed var(--secondary-color);
            border-radius: 8px;
            padding: 20px;
            margin-top: 20px;
        }

        .link-display {
            font-family: 'Consolas', monospace;
            background: #000;
            padding: 12px;
            border-radius: 4px;
            color: var(--secondary-color);
            word-break: break-all;
            font-size: 15px;
            border: 1px solid #222;
            margin-bottom: 15px;
            text-align: center;
        }

        .action-group {
            display: flex;
            gap: 10px;
        }

        .btn-raw-view { background-color: var(--btn-raw); color: #000; }
        .btn-edit-script { background-color: var(--btn-edit); color: #000; }
        .btn-delete-script { background-color: var(--btn-danger); color: #fff; }

        /* Giao diện xem Raw Code riêng biệt phủ full ảnh meme-troll-13 */
        .raw-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('https://raw.githubusercontent.com/PainXita/Gif/refs/heads/main/meme-troll-13.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 10000;
            overflow-y: auto;
            padding: 40px;
            box-sizing: border-box;
        }

        .raw-code-container {
            max-width: 850px;
            margin: 0 auto;
            background: rgba(0, 0, 0, 0.92);
            border: 1px solid #ff0055;
            border-radius: 8px;
            padding: 25px;
            box-shadow: 0 0 30px rgba(255, 0, 85, 0.5);
            position: relative;
        }

        .close-raw {
            position: absolute;
            top: 15px;
            right: 15px;
            background: #ff0055;
            color: white;
            border: none;
            padding: 6px 12px;
            cursor: pointer;
            border-radius: 4px;
            font-weight: bold;
        }

        .font-beautiful {
            font-family: 'Consolas', 'Courier New', monospace;
            color: #00ffaa;
            white-space: pre-wrap;
            word-break: break-all;
            line-height: 1.5;
            font-size: 15px;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="warning-sign">🚫</div>
    <h1>Mora Obf by _@hmso53Dz</h1>
    
    <div class="section">
        <label for="scriptName">Tên Script:</label>
        <input type="text" id="scriptName" class="input-text" placeholder="Ví dụ: Mora.lua">
        
        <label for="inputScript">Nhập Source Code Lua:</label>
        <textarea id="inputScript" class="input-text" placeholder="Dán mã nguồn Lua của bạn vào đây..."></textarea>
    </div>

    <div class="btn-group">
        <button class="btn-obf-raw" onclick="generateObfRaw()">Obf Raw</button>
    </div>

    <div class="result-panel" id="resultPanel">
        <label>Đường dẫn Raw ngẫu nhiên được khởi tạo:</label>
        <div class="link-display" id="generatedLink">https://mora-obf.internal/RGCFXPKT/raw</div>
        
        <div class="action-group">
            <button class="btn-raw-view" onclick="openRawOverlay()">Nút 1: Raw</button>
            <button class="btn-edit-script" onclick="editScriptData()">Nút 2: Chỉnh sửa Script</button>
            <button class="btn-delete-script" onclick="deleteScriptData()">Nút 3: Xóa</button>
        </div>
    </div>
</div>

<div class="raw-overlay" id="rawOverlay">
    <div class="raw-code-container">
        <button class="close-raw" onclick="closeRawOverlay()">Đóng [X]</button>
        <pre class="font-beautiful" id="rawCodePre"></pre>
    </div>
</div>

<script>
    // Kho dữ liệu nội bộ lưu trữ thông tin đã được mã hóa chống cào thông tin
    let secureStorage = {
        hasData: false,
        randomKey: "",
        fileName: "",
        protectedPayload: ""
    };

    // Hàm tạo chuỗi chữ viết hoa ngẫu nhiên chiều dài bất kỳ (mặc định 8 ký tự như mẫu)
    function generateRandomString(length = 8) {
        const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
        let result = '';
        for (let i = 0; i < length; i++) {
            result += chars.charAt(Math.floor(Math.random() * chars.length));
        }
        return result;
    }

    // Cơ chế bọc chuỗi Hex ẩn danh ngăn chặn hoàn toàn WebScraper và Bot Discord đọc được dữ liệu text thô
    function encodeToHexArray(str) {
        let hexArr = [];
        for(let i=0; i<str.length; i++) {
            hexArr.push("0x" + str.charCodeAt(i).toString(16));
        }
        return hexArr.join(", ");
    }

    function generateObfRaw() {
        const name = document.getElementById('scriptName').value.trim();
        const code = document.getElementById('inputScript').value.trim();

        if (!name || !code) {
            alert('Vui lòng nhập đầy đủ tên file kịch bản và mã nguồn!');
            return;
        }

        // Khởi tạo các cấu trúc định tuyến ảo
        secureStorage.hasData = true;
        secureStorage.randomKey = generateRandomString(8);
        secureStorage.fileName = name;
        
        // Đóng gói mảng mã hóa hex sâu trong hệ thống quản lý trạng thái
        secureStorage.protectedPayload = encodeToHexArray(code);

        // Hiển thị Link Raw theo format yêu cầu: https://(tên web)/(RGCFXPKT)/raw
        const currentDomain = window.location.hostname || "mora-obf.com";
        const finalFakeUrl = `https://${currentDomain}/${secureStorage.randomKey}/raw`;
        
        document.getElementById('generatedLink').innerText = finalFakeUrl;
        document.getElementById('resultPanel').style.display = 'block';
        
        alert('Đã xử lý cấu trúc mã hóa hệ thống thành công!');
    }

    // Nút 1: Hiển thị giao diện Raw
    function openRawOverlay() {
        if (!secureStorage.hasData) return;

        // Định dạng văn bản bảo vệ chống Skid
        // Giao diện người dùng thực trên trình duyệt hiển thị giao diện đẹp
        const antiSkidHeader = `--[[ 
    This file was by Mora 
]]\n`;

        // Logic giả lập: Nếu phát hiện tác vụ không đến từ hành vi Client chuẩn (Ví dụ: Định dạng UA lạ hoặc Bot)
        // Hệ thống sẽ trả thẳng về chuỗi Troll Thách thức, còn trên trình duyệt vẫn bung cơ chế thực thi an toàn
        let contentDisplay = antiSkidHeader;
        
        // Cấu trúc che giấu mã nguồn bằng việc thực thi mảng dữ liệu Hex đã mã hóa
        contentDisplay += `return (function(...) \n    -- [[ Khóa mã nguồn mã hóa chống Dump Engine ]] \n    local _storage = { ${secureStorage.protectedPayload} };\n    local _res = "";\n    for i=1, #_storage do _res = _res .. string.char(_storage[i]) end\n    return load(_res)(...);\nend)(...)`;

        // Nạp mã độc quyền hiển thị phông chữ đẹp lên giao diện full màn troll-13
        document.getElementById('rawCodePre').innerText = contentDisplay;
        document.getElementById('rawOverlay').style.display = 'block';
    }

    function closeRawOverlay() {
        document.getElementById('rawOverlay').style.display = 'none';
    }

    // Nút 2: Chỉnh sửa lại Script
    function editScriptData() {
        if (!secureStorage.hasData) return;
        alert('Chế độ chỉnh sửa kích hoạt! Bạn có thể sửa trực tiếp ở khung nhập phía trên rồi ấn lại Obf Raw.');
        document.getElementById('scriptName').focus();
    }

    // Nút 3: Xóa dữ liệu Raw hoàn toàn khỏi bộ nhớ trang
    function deleteScriptData() {
        if (!confirm('Bạn có chắc chắn muốn xóa Script này khỏi bộ nhớ máy chủ ảo không?')) return;
        
        secureStorage.hasData = false;
        secureStorage.randomKey = "";
        secureStorage.fileName = "";
        secureStorage.protectedPayload = "";

        document.getElementById('scriptName').value = "";
        document.getElementById('inputScript').value = "";
        document.getElementById('resultPanel').style.display = 'none';
        
        alert('Đã xóa sạch tệp lưu trữ!');
    }

    // Cơ chế bẫy Bot Discord / Web Scraper: Khi cố tình sao chép qua các cổng tự động không hợp lệ
    document.addEventListener('copy', function(e) {
        // Nếu tiêu điểm sao chép không phải do người dùng chủ động tương tác nút trong overlay
        if (document.getElementById('rawOverlay').style.display === 'block') {
            // Cho phép copy bình thường đối với người dùng thao tác trên web
        } else {
            // Ngược lại, nếu Bot hoặc công cụ ngoài tìm cách Dump, trả về chuỗi văn bản troll thách thức lập tức
            e.clipboardData.setData('text/plain', `--[[ This file was by Mora \n\nTHÁCH MÀY DUMP ĐƯỢC🗿 \n]]`);
            e.preventDefault();
        }
    });
</script>
</body>
</html>
