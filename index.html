<!DOCTYPE html>
<html lang='en'>
<head>
    <meta charset='UTF-8'>
    <meta name='viewport' content='width=device-width, initial-scale=1.0'>
    <title>Lua Script Obfuscator</title>
    <style>
        body { font-family: Arial, sans-serif; }
        #output { margin-top: 20px; }
    </style>
</head>
<body>
    <h1>Lua Script Obfuscator</h1>
    <label for='inputCode'>Enter your Lua code:</label><br>
    <textarea id='inputCode' rows='10' cols='50'></textarea><br>
    <input type='file' id='fileInput' accept='.lua'><br>
    <button id='obfuscateBtn'>Obf Script</button>
    <div id='output'>
        <h2>Obfuscated Code:</h2>
        <textarea id='obfuscatedCode' rows='10' cols='50' readonly></textarea><br>
        <button id='copyBtn'>Copy</button>
        <button id='downloadBtn'>Download</button>
    </div>
    <script>
        document.getElementById('obfuscateBtn').onclick = function() {
            var inputCode = document.getElementById('inputCode').value;
            var obfuscatedCode = obfuscate(inputCode);
            document.getElementById('obfuscatedCode').value = obfuscatedCode;
        };
        document.getElementById('copyBtn').onclick = function() {
            var obfuscatedCode = document.getElementById('obfuscatedCode');
            obfuscatedCode.select();
            document.execCommand('copy');
        };
        document.getElementById('downloadBtn').onclick = function() {
            var obfuscatedCode = document.getElementById('obfuscatedCode').value;
            var blob = new Blob([obfuscatedCode], { type: 'text/plain' });
            var link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = 'MoraSkibididomdomyesyes.lua.txt';
            link.click();
        };
        function obfuscate(code) {
            // Dummy obfuscation logic. Replace this with a real obfuscation algorithm.
            return '--[[ This file was by Mora \n ' + code.split('').reverse().join('') + '\n ]]';
        }
    </script>
</body>
</html>
